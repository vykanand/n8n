version: '3.8'
services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - TZ=UTC
      - NODE_ENV=production
    volumes:
      - ./data:/home/node/.n8n
    restart: unless-stopped
